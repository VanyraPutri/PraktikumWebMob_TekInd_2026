<!DOCTYPE html> 
<html lang="id"> 
<head> 
<meta charset="UTF-8"> 
<title>Integrasi API Data Karyawan</title> 
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" 
rel="stylesheet"> 
</head> 
<body class="container mt-5"> 
<h2 class="mb-4">Data Karyawan (Dari Server)</h2> 
<div class="mb-3">
    <button id="btnLoad" class="btn btn-primary">Muat Data dari API</button>
    <button id="btnTambah" class="btn btn-success ms-2">Tambah Karyawan</button>
    <div id="loading" class="spinner-border text-primary d-none" role="status"></div>
</div>
<!-- LATIHAN 2: Input Filter Array -->
<div class="mb-3">
    <label for="filterKota" class="form-label">🔍 Filter berdasarkan Kota:</label>
    <input type="text" id="filterKota" class="form-control" placeholder="Contoh: Gwenborough, Wisokyburgh, South Elvis..." style="max-width: 350px;">
    <small class="text-muted">Ketik nama kota, lalu klik "Muat Data" untuk melihat hasil filter</small>
</div>
<div class="row" id="containerKaryawan"> 
<!-- Card karyawan akan muncul di sini --> 
</div> 
<script src="api2_script.js"></script> 
</body> 
</html>
