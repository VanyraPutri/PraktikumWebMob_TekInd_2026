<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tugas Mini - Sistem Antrian Job Shop</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { padding: 20px; background-color: #f8f9fa; }
        .container { max-width: 800px; margin: 0 auto; }
        .card { border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .job-card { background-color: #fff3cd; border-left: 4px solid #ffc107; padding: 10px; margin-bottom: 10px; border-radius: 5px; }
        .console-box { background-color: #1e1e1e; color: #00ff00; padding: 15px; border-radius: 5px; font-family: monospace; height: 200px; overflow-y: auto; }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="card-header bg-warning text-dark">
                <h4 class="mb-0">🏭 Tugas Proyek Mini: Sistem Antrian Job Shop</h4>
            </div>
            <div class="card-body">
                <p class="card-text">Simulasi antrian 3 pekerjaan mesin dengan function <code>prosesAntrian()</code>.</p>
                
                <div class="row">
                    <div class="col-md-6">
                        <h5>📋 Antrian Saat Ini:</h5>
                        <div id="daftarAntrian"></div>
                    </div>
                    <div class="col-md-6">
                        <h5>➕ Tambah Job Baru:</h5>
                        <div class="mb-2">
                            <input type="text" id="idJob" class="form-control mb-2" placeholder="ID Job (contoh: J05)">
                            <input type="text" id="namaProses" class="form-control mb-2" placeholder="Nama Proses (contoh: Grinding)">
                            <input type="number" id="durasi" class="form-control mb-2" placeholder="Durasi (menit)">
                            <button class="btn btn-warning w-100" onclick="tambahJob()">Tambah Job</button>
                        </div>
                    </div>
                </div>
                
                <hr>
                
                <div class="text-center mb-3">
                    <button class="btn btn-primary" onclick="jalankanProses()">▶️ Jalankan Proses Antrian</button>
                    <button class="btn btn-secondary" onclick="resetAntrian()">⟲ Reset Antrian</button>
                </div>
                
                <h5>📟 Output Console:</h5>
                <div class="console-box" id="consoleOutput">
                    [Klik tombol untuk melihat output]
                </div>
            </div>
        </div>
    </div>

    <script src="proyekmini.js"></script>
</body>
</html>
